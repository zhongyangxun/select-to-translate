<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  .panel {
    position: fixed;
    z-index: 2147483647;
    width: 280px;
    max-height: 300px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    font-family:
      -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    color: #333;
    overflow: hidden;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: #f7f7f8;
    border-bottom: 1px solid #eee;
  }
  .word {
    font-weight: 600;
    font-size: 16px;
    color: #1a1a1a;
  }
  .close-btn {
    width: 20px;
    height: 20px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 18px;
    color: #999;
    line-height: 1;
  }
  .close-btn:hover {
    color: #333;
  }
  .content {
    padding: 12px;
    overflow-y: auto;
    max-height: 240px;
  }
  .definition {
    line-height: 1.6;
    color: #444;
    white-space: pre-wrap;
  }
  .loading {
    color: #999;
    font-style: italic;
  }
  .not-found {
    color: #999;
  }
</style>

<div class="panel">
  <div class="header">
    <span class="word"></span>
    <button class="close-btn">&times;</button>
  </div>
  <div class="content">
    <div class="definition"></div>
  </div>
</div>
