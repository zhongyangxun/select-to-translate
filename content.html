<style>
  :host {
    --panel-width: 340px;
    --primary: oklch(0.52 0.14 195);
    --muted: oklch(0.94 0.006 240);
    --card: oklch(1 0 0);
    --foreground: oklch(0.18 0.01 240);
    --muted-foreground: oklch(0.52 0.01 240);
    --border: oklch(0.88 0.008 240);
    --chip-prefix: oklch(0.93 0.06 258);
    --chip-prefix-fg: oklch(0.38 0.12 258);
    --chip-root: oklch(0.93 0.08 195);
    --chip-root-fg: oklch(0.32 0.12 195);
    --chip-suffix: oklch(0.93 0.07 80);
    --chip-suffix-fg: oklch(0.42 0.1 80);
    --shadow: oklch(0 0 0 / 15%);
  }

  :host(.dark) {
    --primary: oklch(0.62 0.14 195);
    --muted: oklch(0.24 0.01 240);
    --card: oklch(0.18 0.008 240);
    --foreground: oklch(0.94 0.006 240);
    --muted-foreground: oklch(0.58 0.01 240);
    --border: oklch(0.28 0.01 240);
    --chip-prefix: oklch(0.26 0.08 258);
    --chip-prefix-fg: oklch(0.74 0.14 258);
    --chip-root: oklch(0.24 0.08 195);
    --chip-root-fg: oklch(0.72 0.14 195);
    --chip-suffix: oklch(0.28 0.07 80);
    --chip-suffix-fg: oklch(0.78 0.12 80);
    --shadow: oklch(0 0 0 / 20%);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .panel {
    position: fixed;
    z-index: 2147483647;
    width: var(--panel-width);
    background-color: var(--card);
    border-radius: 12px;
    box-shadow: 0 8px 20px var(--shadow);
    font-family: 'Inter', sans-serif;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 16px 16px 12px 16px;
    gap: 8px;
  }

  .word {
    font-size: 20px;
    line-height: 28px;
    font-weight: 600;
    color: var(--foreground);
  }

  .variant-info {
    font-size: 12px;
    line-height: 20px;
    font-weight: 400;
    color: var(--muted-foreground);
  }

  .variant-info:empty {
    display: none;
  }

  .phonetic-container {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
  }

  .phonetic {
    font-size: 14px;
    line-height: 20px;
    color: var(--muted-foreground);
    font-weight: 400;
  }

  .audio-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border: none;
    background: transparent;
    border-radius: 50%;
    color: var(--muted-foreground);
    transition:
      background-color 0.15s,
      color 0.15s;
    flex-shrink: 0;
  }

  .audio-btn:hover {
    color: var(--primary);
    background-color: color-mix(in oklch, var(--primary) 10%, transparent);
  }

  .close-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    /* 垂直居中补偿，因为 `&times;` 的基线比文字高 */
    padding-top: 2px;
    border: none;
    background: transparent;
    border-radius: 50%;
    font-size: 18px;
    color: var(--muted-foreground);
    transition:
      background-color 0.15s,
      color 0.15s;
    flex-shrink: 0;
  }

  .close-btn:hover {
    background-color: var(--muted);
    color: var(--foreground);
  }

  .definition-section {
    padding: 8px 16px 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .def-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .pos-label {
    font-size: 12px;
    line-height: 16px;
    font-weight: 600;
    color: var(--primary);
    flex-shrink: 0;
  }

  .def-text {
    font-size: 14px;
    line-height: 1.625;
    font-weight: 400;
    color: var(--foreground);
  }

  .root-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 16px 16px;
  }

  .root-list {
    margin-top: 4px;
    display: flex;
    justify-content: center;
    gap: 12px;
  }

  .root-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }

  .root-item .root {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    color: var(--foreground);
    letter-spacing: 0.025em;
  }

  .root-item .prefix {
    background-color: var(--chip-prefix);
    color: var(--chip-prefix-fg);
  }
  .root-item .root-word {
    background: var(--chip-root);
    color: var(--chip-root-fg);
  }
  .root-item .suffix {
    background: var(--chip-suffix);
    color: var(--chip-suffix-fg);
  }

  .root-item .note {
    font-size: 10px;
    font-weight: 500;
    color: var(--muted-foreground);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .root-item .meaning {
    font-size: 12px;
    font-weight: 400;
    color: var(--muted-foreground);
    text-align: center;
    line-height: 1.625;
  }

  .composition {
    margin-top: 12px;
    font-size: 12px;
    line-height: 1.625;
    font-weight: 400;
    color: var(--muted-foreground);
    text-align: center;
  }

  .not-found-section {
    display: none;
  }

  .loading .word,
  .loading .phonetic,
  .loading .pos-label,
  .loading .def-text,
  .loading .root-item span,
  .loading .composition {
    background-color: var(--muted);
    border-radius: 6px;
    color: transparent;
    min-height: 1em;
    animation: shimmer 1.5s ease-in-out infinite;
  }

  .loading .word {
    min-height: 1.2em;
    width: 112px;
  }

  .loading .variant-info {
    display: none;
  }

  .loading .phonetic {
    display: inline-block;
    width: 88px;
  }

  .loading .audio-btn {
    display: none;
  }

  .loading .pos-label {
    width: 20px;
  }

  .loading .def-text {
    width: 96px;
  }

  .loading .def-row:last-child .def-text {
    width: 80px;
  }

  .loading .root-item span {
    display: inline-block;
  }

  .loading .root-item .root {
    min-height: 2em;
  }

  .loading .root-item .prefix {
    width: 48px;
  }

  .loading .root-item .root-word {
    width: 44px;
  }

  .loading .root-item .suffix {
    width: 52px;
  }

  .loading .root-item .note {
    width: 32px;
  }

  .loading .root-item .meaning {
    width: 56px;
  }

  .loading .composition {
    width: 192px;
  }

  @keyframes shimmer {
    0%,
    100% {
      opacity: 1;
    }
    50% {
      opacity: 0.5;
    }
  }

  .not-found .phonetic-container,
  .not-found .definition-section,
  .not-found .root-section {
    display: none;
  }

  .not-found .not-found-section {
    display: block;
    padding: 0 16px 16px 16px;
  }

  .not-found .not-found-content {
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--muted-foreground);
  }

  .not-found .not-found-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    background-color: var(--muted);
    border-radius: 50%;
  }

  .not-found .not-found-text-content {
    font-size: 14px;
    line-height: 1.625;
    font-weight: 400;
  }

  .no-root .root-section {
    display: none;
  }

  .no-pronunciation .phonetic-container {
    display: none;
  }
</style>

<div class="panel loading">
  <div class="header">
    <div class="word-container">
      <div class="word-content">
        <h2 class="word"></h2>
        <p class="variant-info"></p>
      </div>
      <div class="phonetic-container">
        <span class="phonetic"></span>
        <button class="audio-btn">
          <svg
            width="13"
            height="13"
            viewBox="0 0 22 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
          </svg>
        </button>
      </div>
    </div>
    <button class="close-btn">&times;</button>
  </div>
  <div class="content">
    <div class="definition-section">
      <div class="def-row">
        <div class="pos-label"></div>
        <div class="def-text"></div>
      </div>
      <div class="def-row">
        <div class="pos-label"></div>
        <div class="def-text"></div>
      </div>
    </div>
    <div class="root-section">
      <div class="root-list">
        <div class="root-item">
          <span class="root prefix"></span>
          <span class="note">PREFIX</span>
          <span class="meaning"></span>
        </div>
        <div class="root-item">
          <span class="root root-word"></span>
          <span class="note">ROOT</span>
          <span class="meaning"></span>
        </div>
        <div class="root-item">
          <span class="root suffix"></span>
          <span class="note">SUFFIX</span>
          <span class="meaning"></span>
        </div>
      </div>
      <p class="composition"></p>
    </div>
    <div class="not-found-section">
      <p class="not-found-content">
        <span class="not-found-icon">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
            <line x1="8" y1="8" x2="14" y2="14" />
            <line x1="14" y1="8" x2="8" y2="14" /></svg
        ></span>
        <span class="not-found-text-content"> 未找到该单词 </span>
      </p>
    </div>
  </div>
</div>
